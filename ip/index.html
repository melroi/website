<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/logo_onglet.png">
  <meta name="robots" content="noindex, nofollow">
  <title>Mon IP — melroi.fr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: rgba(255,255,255,0.07);
      --accent: #6c63ff;
      --accent2: #00d4ff;
      --text: #e8e8f0;
      --muted: #5a5a72;
      --glow: rgba(108, 99, 255, 0.35);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(0,212,255,0.09) 0%, transparent 70%);
      pointer-events: none;
      animation: drift 15s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(3%, 4%) scale(1.05); }
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 64px;
      text-align: center;
      max-width: 540px;
      width: 90vw;
      box-shadow:
        0 0 0 1px rgba(108,99,255,0.1),
        0 24px 80px rgba(0,0,0,0.6),
        0 0 60px var(--glow);
      backdrop-filter: blur(12px);
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .ip-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.04em;
      min-height: 3.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.4s ease;
    }

    .ip-display.loading {
      font-size: 1.2rem;
      opacity: 0.4;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.7; }
    }

    .copy-btn {
      margin-top: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--accent), #8b80ff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s;
      box-shadow: 0 4px 24px rgba(108,99,255,0.4);
      user-select: none;
    }
    .copy-btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(108,99,255,0.55); }
    .copy-btn:active { transform: translateY(0);    box-shadow: 0 2px 10px rgba(108,99,255,0.3); }
    .copy-btn.copied { background: linear-gradient(135deg, #22c55e, #16a34a); box-shadow: 0 4px 24px rgba(34,197,94,0.4); }

    .divider {
      margin: 36px 0 28px;
      border: none;
      border-top: 1px solid var(--border);
    }

    .cli-section {
      text-align: left;
    }

    .cli-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .cli-block {
      background: #0d0d1a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      color: var(--accent2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .cli-copy {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .cli-copy:hover { color: var(--text); background: rgba(255,255,255,0.07); }

    .back-link {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 20;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e1e2e;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 0.85rem;
      color: var(--text);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <a href="/" class="back-link">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    melroi.fr
  </a>

  <div class="card">
    <div class="label">Ton adresse IP publique</div>

    <div class="ip-display loading" id="ip-display">chargement...</div>

    <button class="copy-btn" id="copy-btn" onclick="copyIP()" disabled>
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      Copier
    </button>

    <hr class="divider">

    <div class="cli-section">
      <div class="cli-label">Obtenir via CLI</div>

      <div class="cli-block">
        <span>curl https://api.ipify.org</span>
        <button class="cli-copy" onclick="copyCLI('curl https://api.ipify.org')" title="Copier">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>

      <div class="cli-block">
        <span>curl https://api.ipify.org?format=json</span>
        <button class="cli-copy" onclick="copyCLI('curl https://api.ipify.org?format=json')" title="Copier">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let myIP = '';

    async function fetchIP() {
      const el = document.getElementById('ip-display');
      const btn = document.getElementById('copy-btn');
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        myIP = data.ip;
        el.classList.remove('loading');
        el.textContent = myIP;
        btn.disabled = false;
      } catch {
        el.classList.remove('loading');
        el.style.fontSize = '1rem';
        el.textContent = 'Impossible de récupérer l\'IP';
      }
    }

    function copyIP() {
      if (!myIP) return;
      navigator.clipboard.writeText(myIP).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copié !`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copier`;
        }, 2000);
      });
    }

    function copyCLI(cmd) {
      navigator.clipboard.writeText(cmd).then(() => showToast('Commande copiée !'));
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    fetchIP();
  </script>
</body>
</html>
