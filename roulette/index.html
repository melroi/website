<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Roulette</h1>
            <nav class="top-nav">
                <a href="../pileouface/index.html" class="nav-link">Pièce (Pile ou Face) ➡</a>
            </nav>
        </header>

        <main class="container">
            <section class="wheel-section">
                <div class="wheel-container">
                    <canvas id="wheelCanvas" width="500" height="500"></canvas>
                    <div class="arrow"></div>
                    <button id="spinBtn">Lancer</button>
                </div>
                <div id="resultDisplay" class="result-card hidden">
                    <h3>Résultat</h3>
                    <div class="winner-text"></div>
                </div>
            </section>

            <aside class="controls-section">
                <div class="glass-panel">
                    <div class="panel-header">
                        <div class="action-buttons">
                            <button id="addEntryBtn">Ajouter</button>
                            <button id="exportBtn">Exporter</button>
                            <button id="importBtn">Importer</button>
                            <input type="file" id="importInput" style="display:none" accept=".txt">
                        </div>
                    </div>
                    <div id="entriesList" class="entries-list"></div>
                </div>
            </aside>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
